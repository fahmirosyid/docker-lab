[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# Terima log dari Docker fluentd logging driver
[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

# Simpan ke PostgreSQL
# Plugin pgsql INSERT ke kolom: tag, time, data (jsonb)
[OUTPUT]
    Name          pgsql
    Match         *
    Host          postgres-db
    Port          5432
    User          labuser
    Password      labpass123
    Database      labdb
    Table         fluentbit
    Schema        logs
    Timestamp_Key time
    Async         false
    min_pool_size 1
    max_pool_size 4

# Juga print ke stdout (untuk debugging via docker compose logs)
[OUTPUT]
    Name          stdout
    Match         *
    Format        json_lines
